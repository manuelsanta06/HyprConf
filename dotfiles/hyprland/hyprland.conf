# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

env = EDITOR,nvim
env = VISUAL,nvim

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = $terminal yazi "$(cat /tmp/scdf)"
$menu = ~/.config/rofi/launcher.sh

debug:disable_logs = false

#################
### AUTOSTART ###
#################
# Autostart necessary processes (like notifications daemons, status bars, etc.)
exec-once = awww-daemon
exec-once = adb start-server
# exec-once = playerctld daemon
exec-once = $terminal
exec-once = quickshell -c statusBar
exec-once = wl-paste --watch cliphist store
exec-once = dunst > /tmp/dbustlog.txt

###################
### KEYBINDINGS ###
###################
source = ~/.config/hypr/keybinds.conf

################
### MONITORS ###
################
source = ~/.config/hypr/displays.conf

##############
### CURSOR ###
##############
exec-once = hyprctl setcursor Banana 48

#####################
### LOOK AND FEEL ###
#####################
# https://wiki.hyprland.org/Configuring/Variables/#general
general {
  gaps_in = 5
    gaps_out = 5
    border_size = 2

    col.active_border = rgba(8f00ffff)
    col.inactive_border = rgba(595959aa)

    resize_on_border = true

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
  rounding=10
    blur {
      enabled = true
      size = 8
      passes = 1
      noise = 0.0
      xray = true
      special = false
    }
  shadow {
    enabled = true
      range = 10
      color = rgba(8f00ffaf)
      color_inactive = 0
  }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
  enabled = true

    bezier = linealBezier, 1, 1, 1, 1

    animation = windows     , 1, 1.5, linealBezier, slide
    animation = windowsOut  , 1, 1.5, linealBezier, slide
    animation = border      , 0, 10 , default
    animation = borderangle , 1, 8  , default
    # animation = fade        , 1, 5  , default
    animation = workspaces  , 1, 6  , default

}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
  pseudotile = true 
    preserve_split = true
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
  new_status = slave
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
  force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    animate_manual_resizes=true
    on_focus_under_fullscreen=2
}


#############
### INPUT ###
#############
# https://wiki.hyprland.org/Configuring/Variables/#input
input {
  kb_layout = 
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1

  kb_options = caps:hyper

  accel_profile=flat

  touchpad {
    natural_scroll = false
  }
}
device {
  name=elan0788:00-04f3:321a-touchpad 
  accel_profile=adaptive
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
# device {
#     name = epic-mouse-v1
#     sensitivity = -0.5
# }

###################
###### RULES ######
###################
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# no borders nor rounding while floating
# no borders or rounding whe using onli one windows

workspace = w[tv1], gapsout:0, gapsin:0, border:0, rounding:0
#workspace = f[1], gapsout:0, gapsin:0

# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize

# Pictute-In-Picture/dragon-drop floating and pinned
windowrule =  match:title (.*)(Picture-in-Picture)(.*),float on,pin on,move (monitor_w-window_w) 0,size monitor_w*0.3 monitor_h*0.3
windowrule =  match:class dragon-drop, float on, pin on

windowrule = match:class kitty-monitor, float 1,pin 1,move 0 0,size monitor_w*0.27 monitor_h*0.25, border_size 0, no_blur 1, opacity 1.0 override 1.0 override

# Fix pinentry losing focus
windowrule = match:class (pinentry-)(.*), stay_focused on
