[[mgr.prepend_keymap]]
on   = [ "<C-n>" ]
run  = "shell 'dragon-drop -x -T \"$@\"' --confirm"
desc = "Arrastrar archivo (Dragon)"

[[mgr.prepend_keymap]]
on   = [ "<Right>" ]
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"
[[mgr.prepend_keymap]]
on   = [ "<Enter>" ]
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on  = "M"
run = "plugin mount"
